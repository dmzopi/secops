variables:
    GITLEAKS_IMAGE_REPO: 'zricethezav'
    GITLEAKS_IMAGE_NAME: 'gitleaks'
    GITLEAKS_IMAGE_BUILD: 'latest'
    GITLEAKS_REPORT: 'report.json'
    # mode=detect, redact=hide sensitive data in out
    GITLEAKS_OPTS: 'detect --redact -v'

# . = hidden task
.secrets-scanning:
  stage: test
  image:
    name: "$GITLEAKS_IMAGE_REPO/$GITLEAKS_IMAGE_NAME:$GITLEAKS_IMAGE_BUILD"
    entrypoint: [""]
  allow_failure: false
  variables:
    GITLEAKS_GIT_LOGS: '--since=2023-05-01'
  script:
    - gitleaks $GITLEAKS_OPTS --report-path ${GITLEAKS_REPORT} --log-opts=${GITLEAKS_GIT_LOGS}
  artifacts:
    paths:
      - ${GITLEAKS_REPORT}
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'